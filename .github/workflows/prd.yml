name: Production Deployment

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}
  PRD_SERVER_USER: ${{ secrets.PRD_SERVER_USER }}
  PRD_SERVER_IP: ${{ secrets.PRD_SERVER_IP }}

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine Semantic Version from Commit Message
        id: semver
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "0.0.0")
          echo "Latest tag: $LATEST_TAG"
          LATEST_TAG=${LATEST_TAG#v}
          VERSION_MAJOR=$(echo "$LATEST_TAG" | cut -d '.' -f 1)
          VERSION_MINOR=$(echo "$LATEST_TAG" | cut -d '.' -f 2)
          VERSION_PATCH=$(echo "$LATEST_TAG" | cut -d '.' -f 3)

          LAST_COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          echo "Last commit message: $LAST_COMMIT_MESSAGE"

          if [[ "$LAST_COMMIT_MESSAGE" == *"[major]"* ]]; then
              VERSION_MAJOR=$((VERSION_MAJOR + 1))
              VERSION_MINOR=0
              VERSION_PATCH=0
          elif [[ "$LAST_COMMIT_MESSAGE" == *"[minor]"* ]]; then
              VERSION_MINOR=$((VERSION_MINOR + 1))
              VERSION_PATCH=0
          else
              VERSION_PATCH=$((VERSION_PATCH + 1))
          fi

          NEW_VERSION="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          echo "New version: $NEW_VERSION"

          if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
              echo "Tag $NEW_VERSION already exists. Skipping tag creation."
          else
              git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
              git push origin "$NEW_VERSION"
          fi

          echo "VERSION_TAG=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_USERNAME/$DOCKER_IMAGE:latest \
                       -t $DOCKER_USERNAME/$DOCKER_IMAGE:${{ env.VERSION_TAG }} .

      - name: Push Docker images
        run: |
          docker push $DOCKER_USERNAME/$DOCKER_IMAGE:latest
          docker push $DOCKER_USERNAME/$DOCKER_IMAGE:${{ env.VERSION_TAG }}

      - name: SSH connect and deploy container
        run: |
          VERSION_TAG=${{ env.VERSION_TAG }}
          ssh -o StrictHostKeyChecking=no $PRD_SERVER_USER@$PRD_SERVER_IP << EOF
            set -e

            echo "Removing existing local image if present..."
            docker rmi $DOCKER_IMAGE:latest || echo "Not found or failed to remove."

            echo "Ensuring docker network trm-network exists..."
            docker network inspect trm-network >/dev/null 2>&1 || docker network create trm-network

            echo "Checking for existing container..."
            if [ \$(docker ps -a -q -f name=$DOCKER_IMAGE) ]; then
              docker stop $DOCKER_IMAGE
              docker rm $DOCKER_IMAGE
            fi

            NEW_IMAGE="$DOCKER_USERNAME/$DOCKER_IMAGE:$VERSION_TAG"
            echo "Running new container from image: \$NEW_IMAGE"
            docker run -d \
              -e NATS_URL=${{ secrets.NATS_URL }} \
              -e NATS_CREDS=${{ secrets.NATS_CREDS_PRD }} \
              -e SAP_HOST=${{ secrets.SAP_HOST }} \
              -e SAP_CLIENT=${{ secrets.SAP_CLIENT }} \
              -e SAP_USERNAME=${{ secrets.SAP_USERNAME }} \
              -e SAP_PASSWORD=${{ secrets.SAP_PASSWORD }} \
              -e ABAPER_MODE=${{ secrets.ABAPER_MODE }} \
              -e NATS_ENABLE_KV=true \
              -e NATS_ENABLE_MESSAGING=true \
              -v /home/admin/etc/ngs:/etc/ngs:ro \
              --name $DOCKER_IMAGE \
              --network trm-network \
              \$NEW_IMAGE

            echo "Cleaning up unused Docker images..."
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "$DOCKER_USERNAME/$DOCKER_IMAGE" | grep -v -E "(:latest|:\$VERSION_TAG)" | while read -r IMAGE; do
              docker rmi "\$IMAGE" || echo "Failed to remove \$IMAGE"
            done
          EOF

      - name: Post-job cleanup
        if: always()
        run: |
          echo "Cleaning up workspace and Docker system..."
          sudo rm -rf /home/devops/actions-runner/_work/* || true
          sudo rm -rf /home/devops/actions-runner/_diag/* || true
          docker system prune -af || true
          echo "✅ Post-job cleanup complete"
