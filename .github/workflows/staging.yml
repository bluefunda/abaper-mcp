name: Staging Deployment

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/abaper-mcp:alpha
          build-args: |
            VERSION=alpha
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Deploy to staging server
        env:
          STAGING_SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          STAGING_SERVER_IP: ${{ secrets.STAGING_SERVER_IP }}
          STAGING_SAP_HOST: ${{ secrets.STAGING_SAP_HOST }}
          STAGING_SAP_CLIENT: ${{ secrets.STAGING_SAP_CLIENT }}
          STAGING_SAP_USERNAME: ${{ secrets.STAGING_SAP_USERNAME }}
          STAGING_SAP_PASSWORD: ${{ secrets.STAGING_SAP_PASSWORD }}
          STAGING_NATS_URL: ${{ secrets.STAGING_NATS_URL }}
          STAGING_NATS_CREDS: ${{ secrets.STAGING_NATS_CREDS }}
          STAGING_ABAPER_MODE: ${{ secrets.STAGING_ABAPER_MODE }}
        run: |
          ssh -o StrictHostKeyChecking=no $STAGING_SERVER_USER@$STAGING_SERVER_IP << 'EOF'
            # Pull latest staging image
            docker pull ${{ secrets.DOCKER_USERNAME }}/abaper-mcp:alpha

            # Stop and remove existing staging container
            docker stop abaper-mcp-staging 2>/dev/null || true
            docker rm abaper-mcp-staging 2>/dev/null || true

            # Create network if needed
            docker network create mcp-network 2>/dev/null || true

            # Run staging container
            docker run -d \
              --name abaper-mcp-staging \
              --network mcp-network \
              --restart unless-stopped \
              -e SAP_HOST="${{ secrets.STAGING_SAP_HOST }}" \
              -e SAP_CLIENT="${{ secrets.STAGING_SAP_CLIENT }}" \
              -e SAP_USERNAME="${{ secrets.STAGING_SAP_USERNAME }}" \
              -e SAP_PASSWORD="${{ secrets.STAGING_SAP_PASSWORD }}" \
              -e ABAPER_MODE="${{ secrets.STAGING_ABAPER_MODE }}" \
              -e NATS_URL="${{ secrets.STAGING_NATS_URL }}" \
              -e NATS_CREDS="${{ secrets.STAGING_NATS_CREDS }}" \
              -e NATS_ENABLE_KV="true" \
              -e NATS_ENABLE_MESSAGING="true" \
              -v /var/log/abaper-mcp-staging:/var/log/abaper \
              -v /var/nats/creds:/var/nats/creds:ro \
              ${{ secrets.DOCKER_USERNAME }}/abaper-mcp:alpha
          EOF
